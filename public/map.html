<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Cuisine — Discover Chefs</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;0,700;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.css" rel="stylesheet" />
  <script src="https://unpkg.com/maplibre-gl@4.1.2/dist/maplibre-gl.js"></script>
  <style>
    :root {
      --cream: #F5F1E8;
      --ink: #1A1A1A;
      --olive: #2F3A2F;
      --terracotta: #C46A3C;
      --terracotta-light: #D4845A;
      --warm-gray: #8A8577;
      --light-border: rgba(47,58,47,0.12);
      --card-bg: #FDFBF7;
      --serif: 'Playfair Display', Georgia, serif;
      --sans: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%; width: 100%; overflow: hidden;
      font-family: var(--sans);
      background: var(--cream);
      color: var(--ink);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Map ── */
    #map { position: absolute; top: 0; left: 0; width: 100%; height: 100%; }
    .maplibregl-ctrl-attrib { font-size: 10px !important; opacity: 0.3; }

    /* ── Top Bar ── */
    .top-bar {
      position: fixed; top: 0; left: 0; right: 0; z-index: 10;
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 20px; pointer-events: none;
      background: linear-gradient(to bottom, rgba(245,241,232,0.95) 0%, rgba(245,241,232,0.8) 70%, transparent 100%);
    }
    .top-bar > * { pointer-events: auto; }
    .brand {
      font-family: var(--serif);
      font-size: 22px; font-weight: 700;
      color: var(--ink);
      letter-spacing: -0.02em;
      text-decoration: none;
    }
    .top-actions { display: flex; gap: 8px; align-items: center; }

    .btn-pill {
      display: flex; align-items: center; gap: 6px;
      padding: 10px 20px; border-radius: 100px;
      background: var(--card-bg);
      border: 1px solid var(--light-border);
      color: var(--ink); font-size: 13px; font-weight: 600;
      cursor: pointer; transition: all 0.2s; font-family: var(--sans);
    }
    .btn-pill:hover { background: #fff; border-color: rgba(47,58,47,0.2); }
    .btn-pill.accent { background: var(--terracotta); border-color: var(--terracotta); color: #fff; }
    .btn-pill.accent:hover { background: var(--terracotta-light); }

    /* ── Filter Bar ── */
    .filter-bar {
      position: fixed; top: 62px; left: 0; right: 0; z-index: 9;
      padding: 0 20px 12px;
      pointer-events: none;
      display: flex; gap: 8px; overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .filter-bar::-webkit-scrollbar { display: none; }
    .filter-bar > * { pointer-events: auto; }
    .filter-chip {
      flex-shrink: 0;
      padding: 8px 18px; border-radius: 100px;
      background: var(--card-bg);
      border: 1px solid var(--light-border);
      color: var(--ink); font-size: 13px; font-weight: 500;
      cursor: pointer; transition: all 0.2s; font-family: var(--sans);
      white-space: nowrap;
    }
    .filter-chip:hover { border-color: var(--terracotta); }
    .filter-chip.active {
      background: var(--olive); border-color: var(--olive); color: #fff;
    }

    /* ── Map Controls ── */
    .map-controls {
      position: fixed; right: 16px; bottom: 32px; z-index: 10;
      display: flex; flex-direction: column; gap: 8px;
    }
    .map-btn {
      width: 44px; height: 44px; border-radius: 50%;
      background: var(--card-bg);
      border: 1px solid var(--light-border);
      color: var(--ink); font-size: 18px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }
    .map-btn:hover { background: #fff; border-color: rgba(47,58,47,0.2); }
    .map-btn.locating { animation: pulse-ring 1.5s infinite; }

    /* ── Markers ── */
    .map-marker {
      cursor: pointer;
      transition: transform 0.2s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 2px 8px rgba(47,58,47,0.2));
      animation: marker-pop 0.35s cubic-bezier(0.34, 1.56, 0.64, 1) backwards;
    }
    .map-marker:hover { transform: scale(1.2); z-index: 100 !important; }
    .marker-dot {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--olive);
      border: 3px solid var(--card-bg);
      overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .marker-dot img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    .marker-dot .marker-icon {
      font-size: 14px; color: #fff; line-height: 1;
    }
    .marker-online .marker-dot {
      background: var(--terracotta);
      box-shadow: 0 0 0 2px var(--card-bg), 0 0 14px rgba(196,106,60,0.35);
    }
    .marker-stem {
      width: 2px; height: 6px;
      background: var(--olive);
      margin: 0 auto;
      border-radius: 0 0 1px 1px;
    }
    .marker-online .marker-stem { background: var(--terracotta); }

    /* ── Bottom Sheet ── */
    .sheet-backdrop {
      position: fixed; inset: 0; z-index: 20;
      background: rgba(26,26,26,0.3); opacity: 0; pointer-events: none;
      transition: opacity 0.3s;
    }
    .sheet-backdrop.open { opacity: 1; pointer-events: auto; }

    .detail-sheet {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 21;
      background: var(--card-bg);
      border-radius: 24px 24px 0 0;
      transform: translateY(100%);
      transition: transform 0.45s cubic-bezier(0.32, 0.72, 0, 1);
      max-height: 82vh; overflow-y: auto;
      border-top: 1px solid var(--light-border);
    }
    .detail-sheet.open { transform: translateY(0); }

    .sheet-handle { width: 40px; height: 4px; border-radius: 2px; background: rgba(47,58,47,0.15); margin: 12px auto 0; }
    .sheet-content { padding: 20px 24px 36px; }
    .sheet-hero { width: 100%; height: 240px; border-radius: 18px; overflow: hidden; margin-bottom: 18px; background: #e8e4db; }
    .sheet-hero img { width: 100%; height: 100%; object-fit: cover; }
    .sheet-title {
      font-family: var(--serif);
      font-size: 26px; font-weight: 600;
      letter-spacing: -0.02em; margin-bottom: 4px;
    }
    .sheet-subtitle { font-size: 13px; color: var(--terracotta); font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 12px; }
    .sheet-desc { font-size: 14px; line-height: 1.7; color: var(--warm-gray); margin-bottom: 18px; }

    .sheet-product {
      display: flex; align-items: center; gap: 12px;
      padding: 12px 14px;
      background: rgba(47,58,47,0.03);
      border: 1px solid var(--light-border);
      border-radius: 12px; margin-bottom: 8px;
    }
    .sheet-product-info { flex: 1; }
    .sheet-product-name { font-size: 14px; font-weight: 600; }
    .sheet-product-price { font-size: 14px; font-weight: 700; color: var(--terracotta); }
    #sheet-products:not(:empty) { margin-bottom: 18px; }

    .sheet-actions { display: flex; gap: 10px; }
    .sheet-btn {
      flex: 1; padding: 14px; border-radius: 100px;
      font-size: 14px; font-weight: 600; cursor: pointer;
      border: none; font-family: var(--sans); transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 8px;
    }
    .sheet-btn.primary { background: var(--terracotta); color: #fff; }
    .sheet-btn.primary:hover { background: var(--terracotta-light); }
    .sheet-btn.secondary { background: transparent; color: var(--ink); border: 1.5px solid var(--light-border); }
    .sheet-btn.secondary:hover { border-color: var(--ink); }
    .sheet-btn.accent { background: var(--olive); color: #fff; }
    .sheet-btn.accent:hover { opacity: 0.9; }

    /* ── Search Bar ── */
    .search-wrap {
      flex: 1; max-width: 400px; margin: 0 16px; position: relative;
    }
    .search-input {
      width: 100%; padding: 11px 18px 11px 40px; border-radius: 100px;
      background: var(--card-bg);
      border: 1px solid var(--light-border);
      color: var(--ink); font-size: 14px; font-family: var(--sans);
      outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    }
    .search-input:focus { border-color: var(--terracotta); box-shadow: 0 0 0 3px rgba(196,106,60,0.1); }
    .search-input::placeholder { color: #b5b0a5; }
    .search-icon {
      position: absolute; left: 14px; top: 50%; transform: translateY(-50%);
      color: var(--warm-gray); pointer-events: none;
    }
    .search-dropdown {
      position: absolute; top: calc(100% + 8px); left: 0; right: 0;
      background: var(--card-bg);
      border: 1px solid var(--light-border);
      border-radius: 18px;
      max-height: 340px; overflow-y: auto; display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .search-dropdown.open { display: block; }
    .search-item {
      padding: 14px 18px; cursor: pointer; transition: background 0.12s;
      border-bottom: 1px solid var(--light-border);
    }
    .search-item:last-child { border-bottom: none; }
    .search-item:hover { background: rgba(47,58,47,0.04); }
    .search-item-name { font-size: 14px; font-weight: 600; margin-bottom: 2px; }
    .search-item-meta { font-size: 12px; color: var(--warm-gray); }
    .search-empty { padding: 24px 18px; text-align: center; color: var(--warm-gray); font-size: 14px; }

    /* ── Profile Panel ── */
    .profile-backdrop {
      position: fixed; inset: 0; z-index: 22;
      background: rgba(26,26,26,0.4); backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
      opacity: 0; pointer-events: none; transition: opacity 0.3s;
    }
    .profile-backdrop.open { opacity: 1; pointer-events: auto; }
    .profile-panel {
      position: fixed; top: 0; right: 0; bottom: 0; z-index: 23;
      width: 100%; max-width: 500px; background: var(--card-bg);
      transform: translateX(100%);
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      overflow-y: auto; border-left: 1px solid var(--light-border);
    }
    .profile-panel.open { transform: translateX(0); }
    .profile-close {
      position: absolute; top: 18px; right: 18px; z-index: 2;
      width: 38px; height: 38px; border-radius: 50%;
      background: rgba(245,241,232,0.9); backdrop-filter: blur(8px);
      border: 1px solid var(--light-border); color: var(--ink); font-size: 18px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .profile-close:hover { background: #fff; }
    .profile-hero { width: 100%; height: 280px; background: #e8e4db; overflow: hidden; position: relative; }
    .profile-hero img { width: 100%; height: 100%; object-fit: cover; }
    .profile-hero-placeholder { width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 72px; color: rgba(47,58,47,0.15); }
    .profile-body { padding: 28px 28px 40px; }
    .profile-name { font-family: var(--serif); font-size: 28px; font-weight: 600; letter-spacing: -0.02em; margin-bottom: 4px; }
    .profile-cuisine { font-size: 13px; color: var(--terracotta); font-weight: 600; text-transform: uppercase; letter-spacing: 0.06em; margin-bottom: 6px; }
    .profile-address { font-size: 13px; color: var(--warm-gray); margin-bottom: 18px; line-height: 1.5; }
    .profile-tags { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 18px; }
    .profile-tag {
      padding: 5px 14px; border-radius: 100px; font-size: 12px; font-weight: 600;
      background: rgba(47,58,47,0.06); color: var(--olive); border: 1px solid rgba(47,58,47,0.1);
    }
    .profile-section { margin-bottom: 22px; }
    .profile-section-title { font-size: 12px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.08em; color: var(--terracotta); margin-bottom: 10px; }
    .profile-desc { font-size: 14px; line-height: 1.7; color: var(--warm-gray); }
    .profile-product {
      display: flex; align-items: center; gap: 12px; padding: 14px 16px;
      background: rgba(47,58,47,0.03); border: 1px solid var(--light-border);
      border-radius: 14px; margin-bottom: 8px;
    }
    .profile-product-name { font-size: 14px; font-weight: 600; flex: 1; }
    .profile-product-price { font-size: 14px; font-weight: 700; color: var(--terracotta); }
    .profile-contact { display: flex; flex-wrap: wrap; gap: 8px; }
    .profile-contact-link {
      display: flex; align-items: center; gap: 6px; padding: 10px 18px;
      border-radius: 100px; background: rgba(47,58,47,0.04); border: 1px solid var(--light-border);
      color: var(--ink); font-size: 13px; font-weight: 600; text-decoration: none;
      cursor: pointer; transition: all 0.2s;
    }
    .profile-contact-link:hover { background: rgba(47,58,47,0.08); border-color: rgba(47,58,47,0.2); }
    .profile-order-btn {
      display: block; width: 100%; padding: 16px; border-radius: 100px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      border: none; font-family: var(--sans); text-align: center; text-decoration: none;
      background: var(--terracotta); color: #fff; transition: background 0.2s; margin-top: 8px;
    }
    .profile-order-btn:hover { background: var(--terracotta-light); }

    /* ── Auth Modal ── */
    .auth-backdrop {
      position: fixed; inset: 0; z-index: 30;
      background: rgba(26,26,26,0.5); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
      display: flex; align-items: center; justify-content: center;
      opacity: 0; pointer-events: none; transition: opacity 0.3s; padding: 20px;
    }
    .auth-backdrop.open { opacity: 1; pointer-events: auto; }
    .auth-card {
      width: 100%; max-width: 420px; position: relative;
      background: var(--card-bg); border: 1px solid var(--light-border);
      border-radius: 24px; padding: 40px 32px;
      transform: scale(0.93) translateY(12px);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
    }
    .auth-backdrop.open .auth-card { transform: scale(1) translateY(0); }
    .auth-close {
      position: absolute; top: 18px; right: 18px;
      width: 34px; height: 34px; border-radius: 50%;
      background: rgba(47,58,47,0.06); border: none;
      color: var(--warm-gray); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .auth-close:hover { background: rgba(47,58,47,0.12); color: var(--ink); }
    .auth-title { font-family: var(--serif); font-size: 24px; font-weight: 600; margin-bottom: 6px; }
    .auth-sub { color: var(--warm-gray); font-size: 14px; margin-bottom: 28px; line-height: 1.6; }
    .auth-input {
      width: 100%; background: #fff; border: 1.5px solid var(--light-border); border-radius: 14px;
      padding: 14px 18px; color: var(--ink); font-size: 15px;
      outline: none; font-family: var(--sans); margin-bottom: 12px; transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--terracotta); }
    .auth-input::placeholder { color: #b5b0a5; }
    .auth-input.otp { text-align: center; font-size: 26px; font-weight: 700; font-family: 'SF Mono', monospace; letter-spacing: 0.35em; }
    .auth-btn {
      width: 100%; padding: 15px; border-radius: 100px;
      font-size: 15px; font-weight: 600; cursor: pointer;
      border: none; font-family: var(--sans);
      background: var(--terracotta); color: #fff; transition: all 0.2s; margin-top: 4px;
    }
    .auth-btn:hover { background: var(--terracotta-light); }
    .auth-btn:disabled { opacity: 0.4; cursor: default; }
    .auth-link {
      display: block; text-align: center; margin-top: 18px;
      font-size: 13px; color: var(--warm-gray); cursor: pointer;
      background: none; border: none; font-family: var(--sans);
    }
    .auth-link:hover { color: var(--terracotta); }
    .auth-error {
      background: rgba(196,60,60,0.08); border: 1px solid rgba(196,60,60,0.2);
      border-radius: 12px; padding: 11px 14px; color: #c43c3c; font-size: 13px;
      margin-bottom: 14px; display: none;
    }
    .auth-success {
      background: rgba(47,58,47,0.08); border: 1px solid rgba(47,58,47,0.2);
      border-radius: 12px; padding: 11px 14px; color: var(--olive); font-size: 13px;
      margin-bottom: 14px; display: none;
    }

    /* ── Message Panel ── */
    .msg-panel {
      position: fixed; left: 0; right: 0; bottom: 0; z-index: 25;
      background: var(--card-bg); border-radius: 24px 24px 0 0;
      max-height: 70vh; transform: translateY(100%);
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
      display: flex; flex-direction: column;
      border-top: 1px solid var(--light-border);
    }
    .msg-panel.open { transform: translateY(0); }
    .msg-header {
      padding: 18px 24px; border-bottom: 1px solid var(--light-border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .msg-header h3 { font-family: var(--serif); font-size: 18px; font-weight: 600; }
    .msg-close { background: none; border: none; color: var(--warm-gray); font-size: 22px; cursor: pointer; padding: 4px; }
    .msg-close:hover { color: var(--ink); }
    .msg-list { flex: 1; overflow-y: auto; padding: 20px 24px; min-height: 200px; }
    .msg-empty { text-align: center; color: var(--warm-gray); font-size: 14px; padding: 40px 0; }
    .msg-bubble {
      max-width: 75%; padding: 12px 16px; border-radius: 18px;
      font-size: 14px; line-height: 1.5; margin-bottom: 8px; width: fit-content;
    }
    .msg-bubble.sent { background: var(--terracotta); color: #fff; margin-left: auto; border-bottom-right-radius: 4px; }
    .msg-bubble.received { background: rgba(47,58,47,0.06); color: var(--ink); border-bottom-left-radius: 4px; }
    .msg-input-bar { padding: 14px 20px; border-top: 1px solid var(--light-border); display: flex; gap: 10px; }
    .msg-input {
      flex: 1; background: #fff; border: 1px solid var(--light-border);
      border-radius: 100px; padding: 11px 18px; color: var(--ink);
      font-size: 14px; outline: none; font-family: var(--sans); transition: border-color 0.2s;
    }
    .msg-input:focus { border-color: var(--terracotta); }
    .msg-input::placeholder { color: #b5b0a5; }
    .msg-send {
      width: 42px; height: 42px; border-radius: 50%;
      background: var(--terracotta); border: none; color: #fff; font-size: 17px;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: background 0.2s;
    }
    .msg-send:hover { background: var(--terracotta-light); }

    /* ── User Menu ── */
    .user-avatar {
      width: 36px; height: 36px; border-radius: 50%;
      background: var(--olive); display: flex; align-items: center; justify-content: center;
      font-size: 14px; font-weight: 700; color: #fff; cursor: pointer;
      border: 2px solid var(--light-border); transition: border-color 0.2s;
    }
    .user-avatar:hover { border-color: var(--olive); }
    .user-menu {
      position: absolute; top: 56px; right: 20px; z-index: 12;
      background: var(--card-bg); border: 1px solid var(--light-border); border-radius: 16px;
      padding: 8px; min-width: 180px; display: none;
      box-shadow: 0 12px 40px rgba(0,0,0,0.08);
    }
    .user-menu.open { display: block; }
    .user-menu-item {
      display: block; width: 100%; padding: 10px 14px; border-radius: 10px;
      background: none; border: none; color: var(--ink); font-size: 13px;
      font-weight: 500; cursor: pointer; text-align: left; font-family: var(--sans);
      transition: background 0.15s;
    }
    .user-menu-item:hover { background: rgba(47,58,47,0.06); }
    .user-menu-item.danger { color: #c43c3c; }

    /* ── Search Results ── */
    .search-city {
      padding: 12px 18px; cursor: pointer; transition: background 0.15s;
      border-bottom: 1px solid var(--light-border);
    }
    .search-city:hover { background: rgba(47,58,47,0.04); }
    .search-city-name { font-size: 14px; font-weight: 600; color: var(--ink); display: flex; align-items: center; gap: 6px; }
    .search-city-count { font-size: 11px; color: var(--warm-gray); }
    .search-section-label {
      padding: 8px 18px; font-size: 10px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--terracotta); background: rgba(47,58,47,0.03);
    }

    .hidden { display: none !important; }

    /* ── Animations ── */
    @keyframes pulse-ring { 0%, 100% { box-shadow: 0 0 0 0 rgba(196,106,60,0.3); } 50% { box-shadow: 0 0 0 10px transparent; } }
    @keyframes marker-pop { from { transform: scale(0); opacity: 0; } to { transform: scale(1); opacity: 1; } }

    /* ── Desktop ── */
    @media (min-width: 768px) {
      .detail-sheet {
        left: auto; right: 24px; bottom: 24px; width: 400px;
        border-radius: 24px; max-height: calc(100vh - 120px);
        border: 1px solid var(--light-border);
      }
      .msg-panel { left: auto; right: 24px; bottom: 24px; width: 400px; border-radius: 24px; border: 1px solid var(--light-border); }
    }
  </style>
</head>
<body>
  <!-- Map -->
  <div id="map"></div>

  <!-- Top Bar -->
  <div class="top-bar">
    <a href="/" class="brand" id="brand-link">Cuisine</a>
    <div class="search-wrap">
      <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" class="search-input" id="search-input" placeholder="Search chefs or cuisines..." autocomplete="off">
      <div class="search-dropdown" id="search-dropdown"></div>
    </div>
    <div class="top-actions" id="top-actions">
      <button class="btn-pill accent" id="login-btn" onclick="openAuth()">Sign in</button>
    </div>
  </div>

  <!-- Filter Chips -->
  <div class="filter-bar" id="filter-bar">
    <button class="filter-chip active" data-filter="all" onclick="setFilter('all')">All chefs</button>
    <button class="filter-chip" data-filter="Mexican" onclick="setFilter('Mexican')">Mexican</button>
    <button class="filter-chip" data-filter="Mediterranean" onclick="setFilter('Mediterranean')">Mediterranean</button>
    <button class="filter-chip" data-filter="Asian" onclick="setFilter('Asian')">Asian</button>
    <button class="filter-chip" data-filter="Bakery" onclick="setFilter('Bakery')">Bakery</button>
    <button class="filter-chip" data-filter="Vegan" onclick="setFilter('Vegan')">Vegan</button>
    <button class="filter-chip" data-filter="Italian" onclick="setFilter('Italian')">Italian</button>
    <button class="filter-chip" data-filter="Soul Food" onclick="setFilter('Soul Food')">Soul Food</button>
    <button class="filter-chip" data-filter="available" onclick="setFilter('available')">Available now</button>
  </div>

  <!-- User Menu -->
  <div class="user-menu" id="user-menu">
    <button class="user-menu-item" onclick="goToMyProfile()">My Profile</button>
    <button class="user-menu-item" onclick="closeUserMenu()">Messages</button>
    <button class="user-menu-item danger" onclick="doLogout()">Sign out</button>
  </div>

  <!-- Map Controls -->
  <div class="map-controls">
    <button class="map-btn" id="locate-btn" onclick="locateUser()" title="My location">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><circle cx="12" cy="12" r="4"/><path d="M12 2v4M12 18v4M2 12h4M18 12h4"/></svg>
    </button>
    <button class="map-btn" onclick="map.zoomIn()" title="Zoom in">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
    </button>
    <button class="map-btn" onclick="map.zoomOut()" title="Zoom out">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14"/></svg>
    </button>
  </div>

  <!-- Detail Sheet -->
  <div class="sheet-backdrop" id="sheet-backdrop" onclick="closeSheet()"></div>
  <div class="detail-sheet" id="detail-sheet">
    <div class="sheet-handle"></div>
    <div class="sheet-content" id="sheet-content">
      <div class="sheet-hero" id="sheet-hero"><img id="sheet-img" src="" alt=""></div>
      <h2 class="sheet-title" id="sheet-title"></h2>
      <p class="sheet-subtitle" id="sheet-subtitle"></p>
      <p class="sheet-desc" id="sheet-desc"></p>
      <div id="sheet-products"></div>
      <div class="sheet-actions" id="sheet-actions"></div>
    </div>
  </div>

  <!-- Auth Modal -->
  <div class="auth-backdrop" id="auth-backdrop">
    <div class="auth-card">
      <button class="auth-close" onclick="closeAuth()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
      <div id="auth-step-phone">
        <h2 class="auth-title">Welcome to Cuisine</h2>
        <p class="auth-sub">Enter your phone number to sign in or create an account.</p>
        <div id="auth-error" class="auth-error"></div>
        <input type="tel" class="auth-input" id="auth-phone" placeholder="+1 (555) 123-4567" autocomplete="tel">
        <button class="auth-btn" id="auth-send-btn" onclick="authSendOtp()">Continue</button>
      </div>
      <div id="auth-step-otp" style="display:none">
        <h2 class="auth-title">Enter your code</h2>
        <p class="auth-sub">Sent to <strong id="auth-sent-phone"></strong></p>
        <div id="auth-error-otp" class="auth-error"></div>
        <div id="auth-success-otp" class="auth-success"></div>
        <input type="text" class="auth-input otp" id="auth-otp" placeholder="000000" maxlength="6" inputmode="numeric" autocomplete="one-time-code">
        <button class="auth-btn" id="auth-verify-btn" onclick="authVerify()">Verify</button>
        <button class="auth-link" onclick="authReset()">Use a different number</button>
      </div>
      <div id="auth-step-role" style="display:none">
        <h2 class="auth-title">How will you use Cuisine?</h2>
        <p class="auth-sub">You can always change this later.</p>
        <div style="display:flex;gap:12px;margin:20px 0;">
          <button class="auth-role-btn" id="role-buyer" onclick="selectRole('buyer')" style="flex:1;padding:24px 14px;border-radius:18px;background:rgba(47,58,47,0.03);border:2px solid var(--light-border);color:var(--ink);cursor:pointer;font-family:var(--sans);transition:all 0.2s;text-align:center;">
            <div style="font-size:28px;margin-bottom:8px;">&#127860;</div>
            <div style="font-size:14px;font-weight:700;">Discover</div>
            <div style="font-size:12px;color:var(--warm-gray);margin-top:4px;">Find & order from home chefs</div>
          </button>
          <button class="auth-role-btn" id="role-seller" onclick="selectRole('seller')" style="flex:1;padding:24px 14px;border-radius:18px;background:rgba(47,58,47,0.03);border:2px solid var(--light-border);color:var(--ink);cursor:pointer;font-family:var(--sans);transition:all 0.2s;text-align:center;">
            <div style="font-size:28px;margin-bottom:8px;">&#129489;&#8205;&#127859;</div>
            <div style="font-size:14px;font-weight:700;">Cook</div>
            <div style="font-size:12px;color:var(--warm-gray);margin-top:4px;">Share your kitchen & sell meals</div>
          </button>
        </div>
      </div>
      <div id="auth-step-name" style="display:none">
        <h2 class="auth-title">Almost there</h2>
        <p class="auth-sub">Your name and email to get started</p>
        <div id="auth-error-name" class="auth-error"></div>
        <input type="text" class="auth-input" id="auth-name" placeholder="Your name" autocomplete="name" style="margin-bottom:10px">
        <input type="email" class="auth-input" id="auth-email" placeholder="Email address" autocomplete="email">
        <button class="auth-btn" onclick="authComplete()">Get started</button>
      </div>
    </div>
  </div>

  <!-- Profile Panel -->
  <div class="profile-backdrop" id="profile-backdrop" onclick="closeProfile()"></div>
  <div class="profile-panel" id="profile-panel">
    <button class="profile-close" onclick="closeProfile()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div class="profile-hero" id="profile-hero"></div>
    <div class="profile-body" id="profile-body"></div>
  </div>

  <!-- Message Panel -->
  <div class="msg-panel" id="msg-panel">
    <div class="msg-header">
      <h3 id="msg-peer-name">Chat</h3>
      <button class="msg-close" onclick="closeMessages()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M18 6L6 18M6 6l12 12"/></svg>
      </button>
    </div>
    <div class="msg-list" id="msg-list">
      <p class="msg-empty">Start a conversation</p>
    </div>
    <div class="msg-input-bar">
      <input type="text" class="msg-input" id="msg-input" placeholder="Type a message..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button class="msg-send" onclick="sendMessage()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
      </button>
    </div>
  </div>

<script>
let CFG = {};
let currentUser = null;
let map = null;
const BASE = window.__BASE || '';
document.getElementById('brand-link').href = BASE + '/';

let mapMarkers = [];
let mapElements = [];
let activeElement = null;
let sentPhone = '';
let loadDebounce = null;
let activeFilter = 'all';

// ── Init ──
async function init() {
  try {
    const r = await fetch(BASE + '/api/config');
    CFG = await r.json();
  } catch (e) {
    CFG = { name: 'Cuisine', accent: '#C46A3C', defaultLat: 34.07, defaultLng: -118.25, freeViews: 5 };
  }
  document.title = 'Cuisine — Discover Chefs';
  await checkAuth();
  initMap();
}

// ── Map ──
function initMap() {
  map = new maplibregl.Map({
    container: 'map',
    style: 'https://basemaps.cartocdn.com/gl/positron-gl-style/style.json',
    center: [CFG.defaultLng || -118.25, CFG.defaultLat || 34.07],
    zoom: 11, maxZoom: 20, minZoom: 3,
    attributionControl: false
  });

  map.addControl(new maplibregl.AttributionControl({ compact: true }), 'bottom-left');

  map.on('load', () => {
    loadElements();
    locateUser();
  });

  map.on('moveend', () => {
    clearTimeout(loadDebounce);
    loadDebounce = setTimeout(loadElements, 500);
  });

  map.on('click', () => {
    if (document.getElementById('detail-sheet').classList.contains('open')) closeSheet();
  });
}

// ── Geolocation ──
function locateUser() {
  if (!navigator.geolocation) return;
  const btn = document.getElementById('locate-btn');
  btn.classList.add('locating');
  navigator.geolocation.getCurrentPosition(
    async (pos) => {
      btn.classList.remove('locating');
      const { latitude: lat, longitude: lng } = pos.coords;
      map.flyTo({ center: [lng, lat], zoom: 15 });
      try {
        const r = await fetch(BASE + '/api/elements/seed-nearby', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ lat, lng }) });
        const d = await r.json();
        if (d.seeded > 0) setTimeout(loadElements, 500);
      } catch (e) {}
    },
    () => { btn.classList.remove('locating'); },
    { enableHighAccuracy: true, timeout: 10000 }
  );
}

// ── Filter ──
function setFilter(filter) {
  activeFilter = filter;
  document.querySelectorAll('.filter-chip').forEach(c => {
    c.classList.toggle('active', c.dataset.filter === filter);
  });
  renderMarkers(false);
}

// ── Elements ──
let lastElementIds = '';

async function loadElements() {
  if (!map) return;
  const bounds = map.getBounds();
  const url = `${BASE}/api/elements?sw_lat=${bounds.getSouth()}&sw_lng=${bounds.getWest()}&ne_lat=${bounds.getNorth()}&ne_lng=${bounds.getEast()}`;
  try {
    const r = await fetch(url);
    const d = await r.json();
    if (d.ok) {
      const newElements = d.elements.filter(e => e.type === 'seller');
      const newIds = newElements.map(e => e.id).sort().join(',');
      if (newIds === lastElementIds) return;
      lastElementIds = newIds;
      mapElements = newElements;
      renderMarkers(mapMarkers.length === 0);
    }
  } catch (e) { console.error('Load elements failed:', e); }
}

function renderMarkers(animate) {
  mapMarkers.forEach(m => m.remove());
  mapMarkers = [];

  let filtered = mapElements;
  if (activeFilter === 'available') {
    filtered = mapElements.filter(el => el.online);
  } else if (activeFilter !== 'all') {
    filtered = mapElements.filter(el => {
      const ct = (el.cuisineType || el.tags || '').toLowerCase();
      return ct.includes(activeFilter.toLowerCase());
    });
  }

  filtered.forEach((el, i) => {
    const div = document.createElement('div');
    div.className = 'map-marker' + (el.online ? ' marker-online' : '');
    if (animate) div.style.animationDelay = `${Math.min(i * 20, 600)}ms`;
    else div.style.animation = 'none';
    div.innerHTML = `
      <div class="marker-dot">
        ${el.imageUrl ? `<img src="${escAttr(el.imageUrl)}" alt="" loading="lazy" onerror="this.onerror=null;this.src=BASE+'/placeholder-chef.svg';">` : `<img src="${BASE}/placeholder-chef.svg" alt="" loading="lazy">`}
      </div>
      <div class="marker-stem"></div>
    `;
    div.addEventListener('click', (e) => { e.stopPropagation(); openElement(el); });
    const marker = new maplibregl.Marker({ element: div, anchor: 'bottom' })
      .setLngLat([el.lng, el.lat])
      .addTo(map);
    mapMarkers.push(marker);
  });
}

// ── Detail Sheet ──
function openElement(el) {
  activeElement = el;
  const heroEl = document.getElementById('sheet-hero');
  const imgEl = document.getElementById('sheet-img');
  imgEl.src = el.imageUrl || (BASE + '/placeholder-chef.svg');
  imgEl.onerror = function() { this.onerror=null; this.src=BASE+'/placeholder-chef.svg'; };
  heroEl.style.display = 'block';

  document.getElementById('sheet-title').textContent = el.title;
  document.getElementById('sheet-subtitle').textContent = el.cuisineType || el.subtitle || 'Home Chef';
  document.getElementById('sheet-desc').textContent = el.description ? el.description.substring(0, 160) + (el.description.length > 160 ? '...' : '') : '';

  const prodsEl = document.getElementById('sheet-products');
  prodsEl.innerHTML = '';

  const actionsEl = document.getElementById('sheet-actions');
  let btns = `<button class="sheet-btn primary" onclick="goToProfile('${el.id}')">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
    View Profile</button>`;

  fetch(BASE + '/api/elements/' + el.id).then(r => r.json()).then(d => {
    if (d.ok && d.products && d.products.length) {
      prodsEl.innerHTML = d.products.slice(0, 3).map(p =>
        `<div class="sheet-product"><div class="sheet-product-info"><div class="sheet-product-name">${escHtml(p.name)}</div></div><div class="sheet-product-price">$${(p.price/100).toFixed(2)}</div></div>`
      ).join('') + (d.products.length > 3 ? `<div style="font-size:12px;color:var(--warm-gray);text-align:center;padding:6px">+${d.products.length - 3} more meals</div>` : '');
    }
  }).catch(() => {});

  // External link — website or Instagram (shown until chef signs up on Cuisine)
  const extUrl = el.externalOrderUrl || '';
  const igHandle = el.instagram || '';
  if (extUrl) {
    btns += `<a href="${escAttr(extUrl)}" target="_blank" rel="noopener" class="sheet-btn accent" style="text-decoration:none;text-align:center;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/><polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/></svg>
      Visit Website</a>`;
  } else if (igHandle) {
    const igUrl = igHandle.startsWith('http') ? igHandle : 'https://instagram.com/' + igHandle.replace('@', '');
    btns += `<a href="${escAttr(igUrl)}" target="_blank" rel="noopener" class="sheet-btn accent" style="text-decoration:none;text-align:center;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/></svg>
      View Instagram</a>`;
  }

  btns += `<button class="sheet-btn secondary" onclick="messageElement()">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    Message</button>`;
  actionsEl.innerHTML = btns;

  document.getElementById('detail-sheet').classList.add('open');
  document.getElementById('sheet-backdrop').classList.add('open');
  map.easeTo({ center: [el.lng, el.lat], duration: 400 });
}

function closeSheet() {
  document.getElementById('detail-sheet').classList.remove('open');
  document.getElementById('sheet-backdrop').classList.remove('open');
  activeElement = null;
}

// ── Auth ──
async function checkAuth() {
  try {
    const r = await fetch(BASE + '/api/auth/me');
    const d = await r.json();
    if (d.ok && d.user) { currentUser = d.user; updateAuthUI(); }
  } catch (e) {}
}

function updateAuthUI() {
  const actions = document.getElementById('top-actions');
  if (currentUser) {
    const initials = (currentUser.name || '?').split(' ').map(w => w[0]).join('').slice(0, 2).toUpperCase();
    actions.innerHTML = `<div class="user-avatar" onclick="toggleUserMenu()" title="${escAttr(currentUser.name)}">${initials}</div>`;
  } else {
    actions.innerHTML = `<button class="btn-pill accent" onclick="openAuth()">Sign in</button>`;
  }
}

function goToMyProfile() {
  closeUserMenu();
  if (currentUser) window.location.href = BASE + '/profile/' + currentUser.id;
}

function openAuth() {
  document.getElementById('auth-backdrop').classList.add('open');
  setTimeout(() => document.getElementById('auth-phone').focus(), 100);
}
function closeAuth() { document.getElementById('auth-backdrop').classList.remove('open'); authReset(); }

function authReset() {
  ['auth-step-phone', 'auth-step-otp', 'auth-step-role', 'auth-step-name'].forEach((id, i) => {
    document.getElementById(id).style.display = i === 0 ? 'block' : 'none';
  });
  ['auth-error', 'auth-error-otp', 'auth-error-name', 'auth-success-otp'].forEach(id => {
    document.getElementById(id).style.display = 'none';
  });
  document.getElementById('auth-phone').value = '';
  document.getElementById('auth-otp').value = '';
  document.getElementById('auth-name').value = '';
  document.getElementById('auth-send-btn').disabled = false;
  document.getElementById('auth-send-btn').textContent = 'Continue';
  document.getElementById('auth-verify-btn').disabled = false;
  document.getElementById('auth-verify-btn').textContent = 'Verify';
}

function showAuthError(id, msg) { const el = document.getElementById(id); el.textContent = msg; el.style.display = 'block'; }

async function authSendOtp() {
  const phone = document.getElementById('auth-phone').value.trim();
  if (!phone) return showAuthError('auth-error', 'Phone number is required.');
  const btn = document.getElementById('auth-send-btn');
  btn.disabled = true; btn.textContent = 'Sending...';
  document.getElementById('auth-error').style.display = 'none';
  try {
    const r = await fetch(BASE + '/api/auth/start', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone }) });
    const d = await r.json();
    if (d.ok) {
      sentPhone = phone;
      document.getElementById('auth-sent-phone').textContent = phone;
      document.getElementById('auth-step-phone').style.display = 'none';
      document.getElementById('auth-step-otp').style.display = 'block';
      const success = document.getElementById('auth-success-otp');
      success.textContent = d.devCode ? `Code sent! (Dev: ${d.devCode})` : 'Code sent!';
      success.style.display = 'block';
      setTimeout(() => document.getElementById('auth-otp').focus(), 100);
    } else { showAuthError('auth-error', d.error || 'Failed.'); btn.disabled = false; btn.textContent = 'Continue'; }
  } catch (e) { showAuthError('auth-error', 'Network error.'); btn.disabled = false; btn.textContent = 'Continue'; }
}

async function authVerify() {
  const code = document.getElementById('auth-otp').value.trim();
  if (!code || code.length !== 6) return showAuthError('auth-error-otp', 'Enter the 6-digit code.');
  const btn = document.getElementById('auth-verify-btn');
  btn.disabled = true; btn.textContent = 'Verifying...';
  document.getElementById('auth-error-otp').style.display = 'none';
  try {
    const r = await fetch(BASE + '/api/auth/verify', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone: sentPhone, code }) });
    const d = await r.json();
    if (d.ok) {
      if (d.needsName) { document.getElementById('auth-step-otp').style.display = 'none'; document.getElementById('auth-step-role').style.display = 'block'; }
      else { currentUser = d.user; updateAuthUI(); closeAuth(); }
    } else { showAuthError('auth-error-otp', d.error || 'Invalid code.'); btn.disabled = false; btn.textContent = 'Verify'; }
  } catch (e) { showAuthError('auth-error-otp', 'Network error.'); btn.disabled = false; btn.textContent = 'Verify'; }
}

let selectedRole = 'buyer';
function selectRole(role) {
  selectedRole = role;
  document.querySelectorAll('.auth-role-btn').forEach(b => b.style.borderColor = 'var(--light-border)');
  document.getElementById('role-' + role).style.borderColor = 'var(--terracotta)';
  document.getElementById('auth-step-role').style.display = 'none';
  document.getElementById('auth-step-name').style.display = 'block';
  setTimeout(() => document.getElementById('auth-name').focus(), 100);
}

async function authComplete() {
  const name = document.getElementById('auth-name').value.trim();
  if (!name) return showAuthError('auth-error-name', 'Name is required.');
  const email = document.getElementById('auth-email').value.trim();
  if (!email || !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) return showAuthError('auth-error-name', 'Valid email required.');
  try {
    const r = await fetch(BASE + '/api/auth/complete', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ phone: sentPhone, name, email, role: selectedRole }) });
    const d = await r.json();
    if (d.ok) { currentUser = d.user; updateAuthUI(); closeAuth(); }
    else { showAuthError('auth-error-name', d.error || 'Failed.'); }
  } catch (e) { showAuthError('auth-error-name', 'Network error.'); }
}

// ── User Menu ──
function toggleUserMenu() { document.getElementById('user-menu').classList.toggle('open'); }
function closeUserMenu() { document.getElementById('user-menu').classList.remove('open'); }
async function doLogout() {
  closeUserMenu();
  await fetch(BASE + '/api/auth/logout', { method: 'POST' });
  currentUser = null; updateAuthUI();
}
document.addEventListener('click', (e) => {
  const menu = document.getElementById('user-menu');
  if (menu.classList.contains('open') && !menu.contains(e.target) && !e.target.classList.contains('user-avatar')) menu.classList.remove('open');
});

// ── Messaging ──
let msgPeerId = null;
function messageElement() {
  if (!currentUser) return openAuth();
  if (!activeElement) return;
  msgPeerId = activeElement.id;
  document.getElementById('msg-peer-name').textContent = activeElement.title;
  document.getElementById('msg-list').innerHTML = '<p class="msg-empty">Start a conversation</p>';
  document.getElementById('msg-panel').classList.add('open');
  closeSheet();
  loadMessages(msgPeerId);
}
function closeMessages() { document.getElementById('msg-panel').classList.remove('open'); msgPeerId = null; }

async function loadMessages(peerId) {
  try {
    const r = await fetch(BASE + '/api/messages/' + peerId);
    const d = await r.json();
    if (d.ok) {
      const list = document.getElementById('msg-list');
      if (!d.messages.length) { list.innerHTML = '<p class="msg-empty">Start a conversation</p>'; }
      else {
        list.innerHTML = d.messages.map(m => `<div class="msg-bubble ${m.fromId === currentUser.id ? 'sent' : 'received'}">${escHtml(m.text)}</div>`).join('');
        list.scrollTop = list.scrollHeight;
      }
    }
  } catch (e) {}
}

async function sendMessage() {
  const input = document.getElementById('msg-input');
  const text = input.value.trim();
  if (!text || !msgPeerId) return;
  input.value = '';
  const list = document.getElementById('msg-list');
  const empty = list.querySelector('.msg-empty');
  if (empty) empty.remove();
  list.insertAdjacentHTML('beforeend', `<div class="msg-bubble sent">${escHtml(text)}</div>`);
  list.scrollTop = list.scrollHeight;
  try { await fetch(BASE + '/api/messages', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ to: msgPeerId, text }) }); } catch (e) {}
}

// ── Utils ──
function escHtml(s) { const d = document.createElement('div'); d.textContent = s; return d.innerHTML; }
function escAttr(s) { return String(s).replace(/"/g, '&quot;').replace(/'/g, '&#39;').replace(/</g, '&lt;').replace(/>/g, '&gt;'); }

// ── Search ──
let searchDebounce = null;
(function initSearch() {
  const input = document.getElementById('search-input');
  const dropdown = document.getElementById('search-dropdown');
  input.addEventListener('input', () => {
    clearTimeout(searchDebounce);
    const q = input.value.trim();
    if (!q) { dropdown.classList.remove('open'); return; }
    searchDebounce = setTimeout(() => doSearch(q), 300);
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { clearTimeout(searchDebounce); const q = input.value.trim(); if (q) doSearch(q); }
    if (e.key === 'Escape') { dropdown.classList.remove('open'); input.blur(); }
  });
  document.addEventListener('click', (e) => { if (!e.target.closest('.search-wrap')) dropdown.classList.remove('open'); });
})();

async function doSearch(query) {
  const dropdown = document.getElementById('search-dropdown');
  try {
    const r = await fetch(BASE + '/api/elements/search?q=' + encodeURIComponent(query));
    const d = await r.json();
    let html = '';
    if (d.cities && d.cities.length) {
      html += '<div class="search-section-label">Neighborhoods</div>';
      html += d.cities.map(c => `<div class="search-city" onclick="searchCity(${c.lat},${c.lng},'${escAttr(c.name)}')"><div class="search-city-name"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="10" r="3"/><path d="M12 21.7C17.3 17 20 13 20 10a8 8 0 1 0-16 0c0 3 2.7 7 8 11.7z"/></svg>${escHtml(c.name)}</div><div class="search-city-count">${c.count} chef${c.count !== 1 ? 's' : ''}</div></div>`).join('');
    }
    if (d.elements && d.elements.length) {
      if (html) html += '<div class="search-section-label">Chefs</div>';
      html += d.elements.map(el => {
        const meta = [el.cuisineType, el.subtitle].filter(Boolean).join(' \u00b7 ');
        return `<div class="search-item" onclick="searchSelect('${el.id}')"><div class="search-item-name">${escHtml(el.title)}</div><div class="search-item-meta">${meta}</div></div>`;
      }).join('');
    }
    if (!html) html = '<div class="search-empty">No chefs found</div>';
    dropdown.innerHTML = html;
    dropdown.classList.add('open');
  } catch (e) { dropdown.innerHTML = '<div class="search-empty">Search unavailable</div>'; dropdown.classList.add('open'); }
}

function searchCity(lat, lng, name) {
  document.getElementById('search-dropdown').classList.remove('open');
  document.getElementById('search-input').value = name;
  map.flyTo({ center: [lng, lat], zoom: 13, duration: 1500 });
}

function searchSelect(elementId) {
  document.getElementById('search-dropdown').classList.remove('open');
  document.getElementById('search-input').value = '';
  const el = mapElements.find(e => e.id === elementId);
  if (el) { map.flyTo({ center: [el.lng, el.lat], zoom: 16, duration: 1200 }); setTimeout(() => openElement(el), 600); }
  else { fetch(BASE + '/api/elements/' + elementId).then(r => r.json()).then(d => { if (d.ok && d.element) { map.flyTo({ center: [d.element.lng, d.element.lat], zoom: 16, duration: 1200 }); setTimeout(() => openElement(d.element), 600); } }).catch(() => {}); }
}

// ── Profile Panel ──
function openProfile(el) {
  if (!el) return;
  closeSheet();
  const heroEl = document.getElementById('profile-hero');
  heroEl.innerHTML = `<img src="${el.imageUrl ? escAttr(el.imageUrl) : BASE+'/placeholder-chef.svg'}" alt="" onerror="this.onerror=null;this.src='${BASE}/placeholder-chef.svg';">`;

  fetch(BASE + '/api/elements/' + el.id).then(r => r.json()).then(d => {
    const data = (d.ok && d.element) ? d.element : el;
    const products = (d.ok && d.element && d.element.products) ? d.element.products : [];
    renderProfileBody(data, products);
  }).catch(() => renderProfileBody(el, []));

  document.getElementById('profile-backdrop').classList.add('open');
  document.getElementById('profile-panel').classList.add('open');
}

function renderProfileBody(el, products) {
  const bodyEl = document.getElementById('profile-body');
  const meta = el.metadata || {};
  const cuisine = el.cuisineType || meta.cuisineType || '';
  const address = el.address || meta.address || el.subtitle || '';
  const rawTags = el.tags || meta.tags || '';
  const tags = Array.isArray(rawTags) ? rawTags : String(rawTags).split(',').map(t => t.trim()).filter(Boolean);
  const description = el.description || meta.notes || '';
  const website = meta.website || el.externalOrderUrl || '';
  const instagram = el.instagram || meta.instagram || '';
  const phone = el.phone || meta.phone || '';
  const email = el.email || meta.email || '';
  const orderUrl = el.externalOrderUrl || website;

  let html = `<h2 class="profile-name">${escHtml(el.title)}</h2>`;
  if (cuisine) html += `<div class="profile-cuisine">${escHtml(cuisine)}</div>`;
  if (address) html += `<div class="profile-address">${escHtml(address)}</div>`;
  if (tags.length) html += `<div class="profile-tags">${tags.map(t => `<span class="profile-tag">${escHtml(t)}</span>`).join('')}</div>`;
  if (description) html += `<div class="profile-section"><div class="profile-section-title">About</div><div class="profile-desc">${escHtml(description)}</div></div>`;
  if (products.length) {
    html += `<div class="profile-section"><div class="profile-section-title">Menu</div>${products.map(p => `<div class="profile-product"><div class="profile-product-name">${escHtml(p.name)}</div><div class="profile-product-price">$${(p.price/100).toFixed(2)}</div></div>`).join('')}</div>`;
  }

  const contacts = [];
  if (website) contacts.push(`<a href="${escAttr(website)}" target="_blank" rel="noopener" class="profile-contact-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><path d="M2 12h20"/></svg>Website</a>`);
  if (instagram) { const igUrl = instagram.startsWith('http') ? instagram : 'https://instagram.com/' + instagram.replace('@', ''); contacts.push(`<a href="${escAttr(igUrl)}" target="_blank" rel="noopener" class="profile-contact-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="2" y="2" width="20" height="20" rx="5"/><circle cx="12" cy="12" r="4"/></svg>Instagram</a>`); }
  if (phone) contacts.push(`<a href="tel:${escAttr(phone)}" class="profile-contact-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.127.96.361 1.903.7 2.81a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0 1 22 16.92z"/></svg>${escHtml(phone)}</a>`);
  if (email) contacts.push(`<a href="mailto:${escAttr(email)}" class="profile-contact-link"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/><polyline points="22,6 12,13 2,6"/></svg>Email</a>`);
  if (contacts.length) html += `<div class="profile-section"><div class="profile-section-title">Contact</div><div class="profile-contact">${contacts.join('')}</div></div>`;
  if (orderUrl) html += `<a href="${escAttr(orderUrl)}" target="_blank" rel="noopener" class="profile-order-btn">Order</a>`;

  bodyEl.innerHTML = html;
}

function goToProfile(idOrEl) {
  const id = typeof idOrEl === 'string' ? idOrEl : (idOrEl && idOrEl.id);
  if (!id) return;
  closeSheet();
  const url = BASE + '/profile/' + id;
  try { window.top.location.href = url; } catch (e) { window.location.href = url; }
}

function closeProfile() {
  document.getElementById('profile-backdrop').classList.remove('open');
  document.getElementById('profile-panel').classList.remove('open');
}

// ── Keyboard ──
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape') {
    if (document.getElementById('profile-panel').classList.contains('open')) closeProfile();
    else if (document.getElementById('msg-panel').classList.contains('open')) closeMessages();
    else if (document.getElementById('auth-backdrop').classList.contains('open')) closeAuth();
    else if (document.getElementById('detail-sheet').classList.contains('open')) closeSheet();
  }
});

init();
</script>
</body>
