<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kitse Studio</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    :root { --bg: #0a0a0f; --panel: #0d0d14; --border: #1e1e2e; --text: #f0f0ff; --muted: #6b6b8a; --dim: #a0a0c0; --accent: #ea580c; --accent-glow: rgba(234,88,12,0.3); --green: #10b981; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: 'Inter', system-ui, sans-serif; background: var(--bg); color: var(--text); -webkit-font-smoothing: antialiased; overflow: hidden; }

    .studio { display: flex; height: 100vh; }

    /* ── Site Preview ── */
    .preview { flex: 1; position: relative; background: #000; }
    .preview iframe { width: 100%; height: 100%; border: none; }
    .preview-bar {
      position: absolute; top: 0; left: 0; right: 0; z-index: 2;
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; background: rgba(10,10,15,0.92); backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
    }
    .preview-nav-btn {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; font-size: 14px;
    }
    .preview-nav-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }
    .preview-url {
      flex: 1; background: rgba(255,255,255,0.04); border: 1px solid var(--border);
      border-radius: 8px; padding: 6px 12px; color: var(--dim);
      font-size: 12px; font-family: 'JetBrains Mono', monospace;
      outline: none;
    }
    .preview-url:focus { border-color: var(--accent); }
    .preview-reload {
      width: 28px; height: 28px; border-radius: 6px;
      background: rgba(255,255,255,0.05); border: 1px solid var(--border);
      color: var(--muted); cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .preview-reload:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── Chat Panel ── */
    .chat-side {
      width: 440px; min-width: 340px; max-width: 600px;
      background: var(--panel); border-left: 1px solid var(--border);
      display: flex; flex-direction: column; position: relative;
    }
    .chat-resize {
      position: absolute; left: -3px; top: 0; bottom: 0; width: 6px;
      cursor: col-resize; z-index: 5;
    }
    .chat-resize:hover { background: var(--accent-glow); }

    .chat-header {
      padding: 14px 18px; border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 12px;
      background: var(--panel);
    }
    .chat-logo {
      width: 34px; height: 34px; border-radius: 10px;
      background: linear-gradient(135deg, #d97706, #ea580c);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .chat-header-info { flex: 1; }
    .chat-header-info h2 { font-size: 15px; font-weight: 700; }
    .chat-header-info p { font-size: 11px; color: var(--muted); margin-top: 1px; }
    .chat-status { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--green); font-weight: 600; }
    .chat-status-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--green); animation: status-pulse 2s infinite; }
    @keyframes status-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .chat-new-btn {
      background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: var(--muted);
      padding: 6px 12px; border-radius: 8px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; transition: all 0.15s;
    }
    .chat-new-btn:hover { background: rgba(255,255,255,0.08); color: var(--text); }

    /* ── Messages ── */
    .chat-messages {
      flex: 1; overflow-y: auto; padding: 16px; scroll-behavior: smooth;
    }
    .chat-messages::-webkit-scrollbar { width: 4px; }
    .chat-messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    .chat-msg { margin-bottom: 14px; }
    .chat-msg-header { display: flex; align-items: center; gap: 6px; margin-bottom: 4px; }
    .chat-msg-avatar {
      width: 22px; height: 22px; border-radius: 6px;
      display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700;
      flex-shrink: 0;
    }
    .chat-msg.user .chat-msg-avatar { background: #7c3aed; color: #fff; }
    .chat-msg.assistant .chat-msg-avatar { background: var(--accent); color: #fff; }
    .chat-msg-name { font-size: 12px; font-weight: 600; color: var(--dim); }
    .chat-msg-time { font-size: 10px; color: var(--muted); margin-left: auto; }

    .chat-msg-body {
      margin-left: 28px; font-size: 13px; line-height: 1.6; color: var(--dim);
      word-break: break-word;
    }
    .chat-msg-body strong { color: var(--text); }
    .chat-msg-body code {
      font-family: 'JetBrains Mono', monospace; font-size: 12px;
      background: rgba(255,255,255,0.05); padding: 1px 5px; border-radius: 4px;
    }
    .chat-msg-body pre {
      background: #07070e; border: 1px solid var(--border); border-radius: 10px;
      padding: 12px 14px; margin: 8px 0; overflow-x: auto;
      font-family: 'JetBrains Mono', monospace; font-size: 12px; line-height: 1.5;
    }
    .chat-msg-body pre code { background: none; padding: 0; }

    .chat-tool-list { margin-left: 28px; margin-top: 6px; display: flex; flex-wrap: wrap; gap: 4px; }
    .chat-tool-badge {
      font-size: 10px; font-family: 'JetBrains Mono', monospace;
      padding: 2px 8px; border-radius: 6px;
      background: rgba(234,88,12,0.1); color: var(--accent); font-weight: 500;
      border: 1px solid rgba(234,88,12,0.15);
    }
    .chat-files-badge {
      margin-left: 28px; margin-top: 6px;
      font-size: 11px; color: var(--green); font-weight: 600;
      display: flex; align-items: center; gap: 4px;
    }
    .chat-reload-btn {
      display: inline-flex; align-items: center; gap: 4px;
      background: var(--accent); color: #fff; border: none;
      padding: 4px 10px; border-radius: 6px; font-size: 11px; font-weight: 600;
      cursor: pointer; font-family: inherit; margin-left: 6px;
    }
    .chat-reload-btn:hover { filter: brightness(1.15); }

    .chat-typing { margin-left: 28px; display: inline-flex; gap: 4px; padding: 8px 0; }
    .chat-typing span {
      width: 6px; height: 6px; border-radius: 50%; background: var(--muted);
      animation: dot-pulse 1.4s infinite;
    }
    .chat-typing span:nth-child(2) { animation-delay: 0.2s; }
    .chat-typing span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes dot-pulse { 0%, 60%, 100% { opacity: 0.3; } 30% { opacity: 1; } }

    /* ── Input ── */
    .chat-input-area {
      padding: 14px 16px; border-top: 1px solid var(--border);
      background: var(--panel);
    }
    .chat-input-wrap {
      display: flex; align-items: flex-end; gap: 8px;
      background: #07070e; border: 1px solid var(--border); border-radius: 14px;
      padding: 8px 8px 8px 14px; transition: border-color 0.15s;
    }
    .chat-input-wrap:focus-within { border-color: var(--accent); }
    .chat-textarea {
      flex: 1; background: none; border: none; color: var(--text);
      font-size: 13px; font-family: inherit; outline: none; resize: none;
      min-height: 20px; max-height: 120px; line-height: 1.5;
    }
    .chat-textarea::placeholder { color: #3a3a58; }
    .chat-send-btn {
      width: 34px; height: 34px; border-radius: 10px;
      background: var(--accent); border: none; color: #fff;
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      transition: all 0.15s; flex-shrink: 0;
    }
    .chat-send-btn:hover { filter: brightness(1.15); }
    .chat-send-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    .chat-hint {
      display: flex; align-items: center; justify-content: space-between;
      margin-top: 8px; font-size: 10px; color: var(--muted);
    }

    @media (max-width: 768px) {
      .studio { flex-direction: column; }
      .preview { height: 50vh; }
      .chat-side { width: 100%; min-width: unset; max-width: unset; height: 50vh; border-left: none; border-top: 1px solid var(--border); }
      .chat-resize { display: none; }
    }
  </style>
</head>
<body>
  <div class="studio">
    <!-- Preview Pane -->
    <div class="preview" id="preview">
      <div class="preview-bar">
        <button class="preview-nav-btn" onclick="previewBack()" title="Back">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        </button>
        <button class="preview-nav-btn" onclick="previewForward()" title="Forward">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </button>
        <input type="text" class="preview-url" id="preview-url" value="/map" onkeydown="if(event.key==='Enter')navigatePreview(this.value)">
        <button class="preview-reload" onclick="reloadPreview()" title="Reload">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        </button>
      </div>
      <iframe id="preview-frame" src="" style="margin-top:44px;height:calc(100% - 44px);"></iframe>
    </div>

    <!-- Chat Panel -->
    <div class="chat-side" id="chat-side">
      <div class="chat-resize" id="chat-resize"></div>

      <div class="chat-header">
        <div class="chat-logo">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
        </div>
        <div class="chat-header-info">
          <h2>Claude Agent</h2>
          <div class="chat-status"><span class="chat-status-dot"></span> Online</div>
        </div>
        <button class="chat-new-btn" onclick="newSession()">New chat</button>
      </div>

      <div class="chat-messages" id="chat-messages"></div>

      <div class="chat-input-area">
        <div class="chat-input-wrap">
          <textarea class="chat-textarea" id="chat-textarea" placeholder="Describe a change to make..." rows="1"
            onkeydown="handleChatKey(event)" oninput="autoGrow(this)"></textarea>
          <button class="chat-send-btn" id="chat-send-btn" onclick="sendChat()">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M22 2L11 13"/><path d="M22 2l-7 20-4-9-9-4z"/></svg>
          </button>
        </div>
        <div class="chat-hint">
          <span>Enter to send, Shift+Enter for newline</span>
          <span id="chat-session-label"></span>
        </div>
      </div>
    </div>
  </div>

<script>
const BASE = window.__BASE || '';
const STORAGE_KEY = 'kinseb_chat';
let sessionId = null;
let sending = false;
let chatHistory = []; // { role, content, tools, files, time }

// ── Init ──
function init() {
  loadSession();
  renderMessages();
  setupResize();
  updateSessionLabel();

  // Set iframe to map with correct base path
  const frame = document.getElementById('preview-frame');
  frame.src = BASE + '/map.html';
  document.getElementById('preview-url').value = BASE + '/map.html';

  // Track iframe URL changes
  frame.addEventListener('load', () => {
    try {
      const url = frame.contentWindow.location.pathname + frame.contentWindow.location.search;
      document.getElementById('preview-url').value = url;
    } catch (e) {}
  });
}

// ── Session Persistence ──
function loadSession() {
  try {
    const saved = JSON.parse(localStorage.getItem(STORAGE_KEY));
    if (saved && saved.sessionId) {
      sessionId = saved.sessionId;
      chatHistory = saved.messages || [];
    }
  } catch (e) {}

  if (!chatHistory.length) {
    chatHistory.push({
      role: 'assistant',
      content: "Hi! I'm a coding agent connected to this project. Tell me what you'd like to change and I'll modify the code live.\n\nExamples:\n- *\"Make the map markers bigger\"*\n- *\"Add a dark mode toggle\"*\n- *\"Change the accent color to blue\"*\n- *\"Add a footer with copyright info\"*",
      time: Date.now()
    });
  }
}

function saveSession() {
  try {
    localStorage.setItem(STORAGE_KEY, JSON.stringify({
      sessionId,
      messages: chatHistory.slice(-100) // Keep last 100 messages
    }));
  } catch (e) {}
}

function newSession() {
  sessionId = null;
  chatHistory = [{
    role: 'assistant',
    content: "Starting fresh! What would you like to change?",
    time: Date.now()
  }];
  saveSession();
  renderMessages();
  updateSessionLabel();
}

function updateSessionLabel() {
  const label = document.getElementById('chat-session-label');
  label.textContent = sessionId ? `Session: ${sessionId.slice(0, 12)}...` : 'New session';
}

// ── Render Messages ──
function renderMessages() {
  const container = document.getElementById('chat-messages');
  container.innerHTML = '';

  chatHistory.forEach(msg => {
    container.appendChild(createMsgEl(msg));
  });

  container.scrollTop = container.scrollHeight;
}

function createMsgEl(msg) {
  const div = document.createElement('div');
  div.className = `chat-msg ${msg.role}`;

  const time = msg.time ? new Date(msg.time).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) : '';
  const avatar = msg.role === 'user' ? 'You' : 'AI';
  const name = msg.role === 'user' ? 'You' : 'Claude';

  let html = `
    <div class="chat-msg-header">
      <div class="chat-msg-avatar">${msg.role === 'user' ? '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>' : '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg>'}</div>
      <span class="chat-msg-name">${name}</span>
      <span class="chat-msg-time">${time}</span>
    </div>
    <div class="chat-msg-body">${formatContent(msg.content)}</div>
  `;

  if (msg.tools && msg.tools.length) {
    html += `<div class="chat-tool-list">${msg.tools.map(t =>
      `<span class="chat-tool-badge">${esc(t.tool)} ${esc(t.file || '')}</span>`
    ).join('')}</div>`;
  }

  if (msg.files && msg.files.length) {
    html += `<div class="chat-files-badge">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></svg>
      Modified: ${msg.files.join(', ')}
      <button class="chat-reload-btn" onclick="reloadPreview()">
        <svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M23 4v6h-6"/><path d="M1 20v-6h6"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
        Reload
      </button>
    </div>`;
  }

  div.innerHTML = html;
  return div;
}

function formatContent(text) {
  if (!text) return '';
  let html = esc(text);
  // Code blocks
  html = html.replace(/```(\w*)\n?([\s\S]*?)```/g, (_, lang, code) =>
    `<pre><code>${code.trim()}</code></pre>`
  );
  // Inline code
  html = html.replace(/`([^`]+)`/g, '<code>$1</code>');
  // Bold
  html = html.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
  // Italic
  html = html.replace(/\*([^*]+)\*/g, '<em>$1</em>');
  // Newlines
  html = html.replace(/\n/g, '<br>');
  return html;
}

function esc(s) {
  if (!s) return '';
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ── Typing Indicator ──
function showTyping() {
  const container = document.getElementById('chat-messages');
  const div = document.createElement('div');
  div.className = 'chat-msg assistant';
  div.id = 'typing-indicator';
  div.innerHTML = `
    <div class="chat-msg-header">
      <div class="chat-msg-avatar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/></svg></div>
      <span class="chat-msg-name">Claude</span>
    </div>
    <div class="chat-typing"><span></span><span></span><span></span></div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function hideTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

// ── Message Queue ──
let messageQueue = [];
let processing = false;

async function sendChat() {
  const textarea = document.getElementById('chat-textarea');
  const message = textarea.value.trim();
  if (!message) return;

  textarea.value = '';
  textarea.style.height = 'auto';

  // Show user message immediately
  const userMsg = { role: 'user', content: message, time: Date.now() };
  chatHistory.push(userMsg);
  document.getElementById('chat-messages').appendChild(createMsgEl(userMsg));
  document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
  saveSession();

  // Queue and process
  messageQueue.push(message);
  if (!processing) processQueue();
}

async function processQueue() {
  if (processing || messageQueue.length === 0) return;
  processing = true;
  document.getElementById('chat-send-btn').disabled = true;

  while (messageQueue.length > 0) {
    const message = messageQueue.shift();
    showTyping();

    try {
      const r = await fetch(BASE + '/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        credentials: 'include',
        body: JSON.stringify({ sessionId, message })
      });
      hideTyping();
      if (!r.ok) {
        const errText = await r.text();
        throw new Error(`HTTP ${r.status}: ${errText.slice(0, 100)}`);
      }
      const d = await r.json();

      if (d.ok) {
        sessionId = d.sessionId;
        updateSessionLabel();

        const assistantMsg = {
          role: 'assistant',
          content: d.reply,
          tools: d.toolsUsed,
          files: d.filesChanged,
          time: Date.now()
        };
        chatHistory.push(assistantMsg);
        document.getElementById('chat-messages').appendChild(createMsgEl(assistantMsg));

        if (d.filesChanged && d.filesChanged.length) {
          setTimeout(() => reloadPreview(), 500);
        }
      } else {
        const errMsg = { role: 'assistant', content: 'Error: ' + (d.error || 'Something went wrong'), time: Date.now() };
        chatHistory.push(errMsg);
        document.getElementById('chat-messages').appendChild(createMsgEl(errMsg));
      }

      saveSession();
    } catch (e) {
      hideTyping();
      console.error('Chat error:', e);
      const errMsg = { role: 'assistant', content: 'Error: ' + e.message, time: Date.now() };
      chatHistory.push(errMsg);
      document.getElementById('chat-messages').appendChild(createMsgEl(errMsg));
      saveSession();
    }

    document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
  }

  processing = false;
  document.getElementById('chat-send-btn').disabled = false;
  document.getElementById('chat-textarea').focus();
}

// ── Input Handling ──
function handleChatKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendChat();
  }
}

function autoGrow(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 120) + 'px';
}

// ── Preview Controls ──
function navigatePreview(url) {
  // Prepend BASE if the URL is a relative path without it
  if (url.startsWith('/') && BASE && !url.startsWith(BASE)) {
    url = BASE + url;
  }
  document.getElementById('preview-frame').src = url;
}

function reloadPreview() {
  const frame = document.getElementById('preview-frame');
  frame.src = frame.src;
}

function previewBack() {
  try { document.getElementById('preview-frame').contentWindow.history.back(); } catch (e) {}
}

function previewForward() {
  try { document.getElementById('preview-frame').contentWindow.history.forward(); } catch (e) {}
}

// ── Resizable Panel ──
function setupResize() {
  const handle = document.getElementById('chat-resize');
  const panel = document.getElementById('chat-side');
  let startX, startWidth;

  handle.addEventListener('mousedown', (e) => {
    startX = e.clientX;
    startWidth = panel.offsetWidth;
    document.addEventListener('mousemove', onDrag);
    document.addEventListener('mouseup', stopDrag);
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });

  function onDrag(e) {
    const diff = startX - e.clientX;
    const newWidth = Math.max(340, Math.min(800, startWidth + diff));
    panel.style.width = newWidth + 'px';
  }

  function stopDrag() {
    document.removeEventListener('mousemove', onDrag);
    document.removeEventListener('mouseup', stopDrag);
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  }
}

// ── Start ──
init();
</script>
</body>
</html>
